    Entry:
      TargetLanguage: English
      Value: I've found the body of the historian rumored to be researching daedric artifacts at the Sacellum of Boethiah. She appears to have been killed at the hands of Boethiah cultists. I should read her journal to learn more.
- Index: 300
  Unknown: 124
  LogEntries:
  - Flags: []
