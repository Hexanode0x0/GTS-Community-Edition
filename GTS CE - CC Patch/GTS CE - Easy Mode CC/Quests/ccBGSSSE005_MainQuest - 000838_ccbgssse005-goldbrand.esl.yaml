        Quest: 000838:ccbgssse005-goldbrand.esl
        Stage: 470
    Entry:
      TargetLanguage: English
      Value: The historian Eranya was researching Goldbrand, a daedric artifact in the shape of a golden katana. Her notes indicate that she was on her way to discover the burial site of an ancient Nord warrior hidden in the mountains north of Windhelm. I should follow in her footsteps and investigate the burial site myself.
