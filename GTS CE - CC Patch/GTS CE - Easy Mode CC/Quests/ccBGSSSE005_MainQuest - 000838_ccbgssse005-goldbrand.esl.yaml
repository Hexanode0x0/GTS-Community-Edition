- Index: 450
  Unknown: 97
  LogEntries:
  - Flags: []
    Conditions:
    - MutagenObjectType: ConditionFloat
      Data:
        MutagenObjectType: GetGlobalValueConditionData
        Global: 000800:ccbgssse005-goldbrand.esl
