        Quest: 000838:ccbgssse005-goldbrand.esl
        Stage: 470
    Entry:
      TargetLanguage: English
      Value: I discovered another journal left behind by Eranya, the Imperial historian. In them, they detail that the key to opening the tomb lies in understanding the meaning of the two inscriptions in front of the tomb. Her research notes were left in the Arcanaeum in the College of Winterhold, which should have more details on how the tomb can be opened.
  - Flags: []
    Conditions:
    - MutagenObjectType: ConditionFloat
      Data:
        MutagenObjectType: GetGlobalValueConditionData
        Global: 000800:ccbgssse005-goldbrand.esl
    - MutagenObjectType: ConditionFloat
      Data:
        MutagenObjectType: GetStageDoneConditionData
        Quest: 000838:ccbgssse005-goldbrand.esl
        Stage: 470
    Entry:
      TargetLanguage: English
      Value: I discovered another journal left behind by Eranya, the Imperial historian that was rumored to have gone missing. In them, they detail that the key to opening the tomb lies in understanding the meaning of the two inscriptions in front of the tomb. Her research notes were left in the Arcanaeum in the College of Winterhold, which should have more details on how the tomb can be opened.
- Index: 470
  Unknown: 32
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have discovered Eranya's research notes in the College of Winterhold Arcanaeum. In her notes, she detailed the means to open Sivdur's Respite, the tomb that the artifact Goldbrand is rumored to be within. I must obtain Sivdur's amulet and the skull of Sivdur's nemesis, Magrathi. The amulet has been passed down for generations in the Battle-Born family and is now possessed by Lars Battle-Born. Magrathi was entombed within Shroud Hearth Barrow, a Nordic ruin near Ivarstead. I will need both relics to gain entrance to the tomb.
- Index: 510
  Unknown: 97
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I've obtained Sivdur's amulet from Lars Battle-Born. I should place it on the pedestal near the entrance of the tomb in Sivdur's Respite.
- Index: 520
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I've placed Sivdur's amulet on the pedestal near his tomb. When I did so, one of the doors of the tomb seemed to open. I now need to place Magrathi's skull on the other pedestal.
- Index: 710
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I located Magrathi, a powerful dragon priest. I will need to defeat him if I am to claim his skull.
- Index: 720
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have defeated Magrathi. I should reclaim his skull so that I can return it to Sivdur's Respite.
- Index: 730
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have reclaimed Magrathi's skull. I should place it on the pedestal near the entrance of the tomb in Sivdur's Respite.
- Index: 740
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I've placed Magrathi's skull on the pedestal near his tomb. When I did so, one of the doors of the tomb seemed to open. I now need to place Sivdur's amulet on the other pedestal.
- Index: 800
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I've placed both of the relics on the pedestals near the tomb in Sivdur's Respite. As I did so, the final door to the tomb seemed to open. I should see what awaits inside.
- Index: 900
  Unknown: 69
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: After exploring the tomb in Sivdur's Respite, I have discovered the burial chamber of Sivdur himself. Lying upon an altar is Goldbrand, the ancient golden katana that the historian Eranya was in search of.
- Index: 1000
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: Following in the Imperial historian Eranya's footsteps, I gained entrance to the tomb in Sivdur's Respite and retrieved the artifact Goldbrand.
