Name:
  TargetLanguage: English
  Value: Legends Lost
Flags:
- RunOnce
Priority: 15
QuestFormVersion: 0
Type: SideQuest
Stages:
- Flags:
  - StartUpStage
  LogEntries:
  - Flags: []
    Conditions:
    - MutagenObjectType: ConditionFloat
      Data:
        MutagenObjectType: GetRandomPercentConditionData
      ComparisonValue: 9999
    Entry:
      TargetLanguage: English
      Value: Rumors say an old refugee trunk full of letters has been uncovered in Windhelm. I should see if I can find a copy of those letters and more information on the cargo they were carrying.
- Index: 1
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I've found one of the letters, which details the routes of both the caravans as well as decoys designed to misdirect potential thieves. According to the letter, the first caravan was headed west toward Nightgate Inn. Perhaps following its trail will lead to another clue.
- Index: 2
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: The first caravan was attacked by Dwarven creatures. They managed to escape but I found a copy of their logs, along with details of all the other caravans. The next carriage was headed towards Whiterun. I should see what I can find.
- Index: 3
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: On the road to Whiterun I found the remnants of another sacked caravan. According to a note I found in the wreckage, the remaining caravans were set to regroup in Whiterun, and one of the guards visited the Halls of the Dead there.
- Index: 4
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: In response to the attacks, the caravans took a detour towards Falkreath. I'll need to follow their trail to see if they left anything behind.
- Index: 5
  Unknown: 32
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: "The cargo the caravans were delivering appears to hold the missing Tools of Kagremac: Sunder and Wraithguard. Apparently the items were surrendered to Dwemer drones and taken to a vault in the Sightless Pit. If I'm to open the door, I need to take this attunement crystal I found and use it to unlock the vault."
- Index: 6
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I've unlocked the Sightless Vault. Within lies Sunder and Wraithguard.
- Index: 7
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: As predicted, both Tools are guarded by a powerful Dwarven Centurion. I'll have to defeat it if I'm to claim them as my own.
- Index: 8
  Flags:
  - ShutDownStage
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: I've defeated the Dwarven defenses and claimed both Sunder and Wraithguard for myself.
