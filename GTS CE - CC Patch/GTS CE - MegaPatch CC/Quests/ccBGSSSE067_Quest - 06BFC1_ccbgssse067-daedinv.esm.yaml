Stages:
- Index: 1
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I found the Oblivion Gate and defeated the leader of the Mythic Dawn, Vonos. It appears this was an elaborate ritual designed to deceive me, and killing Vonos was the final step. I have become an unwitting instrument of Mehrunes Dagon, and my actions have opened the Oblivion Gate.
- Index: 10
  Flags:
  - StartUpStage
  Unknown: 175
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Centuries have passed since the Oblivion Crisis, yet remnants of that era may still exist in Skyrim. I should pay attention to any news or rumors.
- Index: 20
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: A courier has delivered a letter from a stranger. It looks like a plea for help. I should read it and see what it says.
- Index: 30
  Unknown: 83
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I received a letter from someone named Skorvild claiming to be a reformed member of the Mythic Dawn. He mentioned the Oblivion Crisis and asked me to meet him at the Shrine to Stendarr. I should go there and see what he has to say.
- Index: 40
  LogEntries:
  - Flags: []
- Index: 41
