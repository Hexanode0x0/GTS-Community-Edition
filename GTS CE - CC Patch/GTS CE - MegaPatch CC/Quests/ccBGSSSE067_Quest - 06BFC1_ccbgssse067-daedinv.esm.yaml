- Index: 165
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: While searching for clues about the Mythic Dawn's whereabouts I found a journal on a dead Vigilant of Stendarr. They learned of the Mythic Dawn's plot by capturing and interrogating a priest, and were able to decipher the location of the Oblivion Gate. I should go there and see if I can get inside. Wearing a set of Mythic Dawn robes might make it easier, but I need to be careful.
- Index: 170
  LogEntries:
