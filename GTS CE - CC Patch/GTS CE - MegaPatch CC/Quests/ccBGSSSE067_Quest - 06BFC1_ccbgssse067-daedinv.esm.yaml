  - Flags: []
    Entry:
      TargetLanguage: English
      Value: A stranger asked for my help, but he was killed before I arrived. I was then ambushed by two assassins. I learned that the Mythic Dawn have reemerged, and that they've somehow reassembled an Oblivion gate, but need a powerful artifact to open it. A camp was mentioned in the notes I found. I should go there to see what I can find.
- Index: 70
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: The Mythic Dawn have repaired an Oblivion Gate, but need a Great Welkynd Stone to open it. To avoid the Vigilants of Stendarr they've excavated a back way into an ancient Ayleid ruin where such a stone is rumored to be hidden. A journal at their camp mentioned something about a secret chamber. I should investigate the ruin and see if I can find it before they do.
- Index: 80
  Unknown: 200
  LogEntries:
  - Flags: []
- Index: 90
  Unknown: 40
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: The Mythic Dawn have been searching an Ayleid ruin where a Great Welkynd Stone is rumored to be hidden within a secret chamber. They have been unable to find this chamber, but one of the explorers discovered Ayleid Elemental Shards may be the keys to opening it. I should find the shards.
