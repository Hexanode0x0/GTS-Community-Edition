  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I found and retrieved the Great Welkynd Stone from within Rielle, and defeated the Ayleid Lich guardian, but the Mythic Dawn will stop at nothing to bring Mehrunes Dagon into power. I should search for any clues nearby that might lead me to the location of the Oblivion Gate.
- Index: 160
  Unknown: 40
