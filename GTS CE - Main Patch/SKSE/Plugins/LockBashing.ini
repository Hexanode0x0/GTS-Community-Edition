[Main]
;------------------------------------------------------------
;###### ADAMANT ADDON: DO NOT CHANGE THE POWER VALUES! ######
;------------------------------------------------------------
; Changing the values here will not allow locks to be opened without the needed perks. It will either cause the widget to display incorrectly, or the perks to not work.
fPowerMult = 1.0
fPowerHealthMult = 0.0
fPowerStaminaMult = 0.0
iRequiredPowerNovice = 100
iRequiredPowerApprentice = 200
iRequiredPowerAdept = 300
iRequiredPowerExpert = 400
iRequiredPowerMaster = 500
;------------------------------------------------------------

; Enabling this will make every lock breakable, so the Lockbashing_BreakableDoors and Lockbashing_BreakableContainers FormLists are ignored
; ADAMANT ADDON: This has been changed to 1, but you may revert it.
bAllLocks = 1

; Editor ID of a Perk that is required for bashing locks. This can also be a FormList in which case having "any" of the perks will allow bashing.
; ADAMANT ADDON: Perk checks are handled script-side. Do not set a perk here.
sRequiredPerk = 
bAutoOpenContainers = 1

[Weapons]
;------------------------------------------------------------
;###### ADAMANT ADDON: DO NOT CHANGE THE POWER VALUES! ######
;------------------------------------------------------------
; Increasing the values here will not allow locks to be opened without the needed perks. It will only cause the widget to display incorrectly.
; Decreasing them will result in the locks not opening, despite having the perks.
fUnarmedMult = 1.0
fSwordMult = 1.0
fDaggerMult = 1.0
fWarAxeMult = 1.0
fMaceMult = 1.0
fGreatswordMult = 1.0
fBattleaxeMult = 1.0
fBowMult = 1.0
fCrossbowMult = 1.0
fWarhammerMult = 1.0
;------------------------------------------------------------

[XP]
; gives XP to the weapon's Skill
fXP = 100
; give Lockpicking skill XP
; ---- ADAMANT ADDON: Lockpicking is disabled ----
fLockpickingXP = 0.0
; ------------------------------------------------
fXPNoviceMult = 1.0
fXPApprenticeMult = 2.0
fXPAdeptMult = 3.0
fXPExpertMult = 4.0
fXPMasterMult = 5.0


[Widget]
bEnableHudWidget = 1
iHudWidgetScale = 100
iHudWidgetXOffset = 40
iHudWidgetYOffset = 62