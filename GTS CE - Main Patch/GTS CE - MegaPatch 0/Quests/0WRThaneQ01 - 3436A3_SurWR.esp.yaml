- Index: 60
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: We've managed to fight off two waves on Whitewatch Tower. The raiders were different from the normal brigands that might attempt an attack, bringing both Wild Beasts and Siege Equipment. I wonder if we'll see more of them in the future. I should bring a report of the battle back to the steward in Dragonsreach.
- Index: 70
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: A band of strange raiders, bringing both Wild Beasts and Siege Equipment, launched an assault on Whitewatch Tower. Together with some guardsmen and the other Thanes of Whiterun, I fought them off.
