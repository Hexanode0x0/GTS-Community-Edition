      Value: I have done it. The threat of The Malevolent and the First Vampire is over. I must speak with Meridia once more.
- Index: 80
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: I have done it. The threat of The Malevolent and the First Vampire is over. Both Meridia and High Priestess Alara are thrilled with my work. Meridia has granted me use of the Ring of Khajiiti, and Alara has welcomed me to stay with the Order anytime. Perhaps I should see if there is anything else I can do to assist the other members of the Order...
