- Index: 20
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: After destroying Fiya's Pocket Realm of Coldharbour, I have weakened the Malevolent and their leader. We are heading to Fiya's hideaway to end her plans to raise the First Vampire. We need to put a stop to Fiya and The Malevolent once and for all.
- Index: 25
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: After destroying Fiya's Pocket Realm of Coldharbour, I have weakened the Malevolent and their leader. We are heading to Fiya's hideaway to end her plans to raise the First Vampire. We need to put a stop to Fiya and The Malevolent once and for all.
- Index: 30
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: After interrupting Fiya's ritual to raise the First Vampire, we have been transported by Lamae Bal to her crypt deep underground. The only way to escape is to destroy Lamae and set myself free of her magic.
- Index: 60
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have done it. The threat of The Malevolent and the First Vampire is over. I should speak with Alara to let her know the good news.
- Index: 70
