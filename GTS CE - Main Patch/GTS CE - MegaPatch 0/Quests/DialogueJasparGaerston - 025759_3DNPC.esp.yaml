    Entry:
      TargetLanguage: English
      Value: I found a book written by an anonymous author about a treasure hunter and his follower, an Orc afraid of heights. Something tells me there's more to this story. Perhaps one day I'll find the book's author.
- Index: 20
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: According to Jaspar Gaerston, Adonato Leotelli told him his manuscript read like a blacksmith had written it. Regardless of the merit of Jaspar's work, it is obvious no blacksmith would use such prose, and it implies Adonato never bothered to read the book. I have agreed to seek a second opinion.
- Index: 25
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: In exchange for some clarification, Nythriel has informed me about a scout working for a publisher. I should show him a copy of the Stone Hand and get his honest critique.
