- Index: 10
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Benuni Alfena of Applewatch seems somewhat lonely. I might be able to help him out by asking around on his behalf in Bruma.
- Index: 15
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Felki Silver-Plow seems to think that Benuni and Galarynn might make a good match. It might be best to try speaking to Galarynn next.
- Index: 20
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Galarynn seems willing to meet Benuni once she finds out the result of her Synod recruitment test. I should investigate on her behalf.
- Index: 25
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Cadius Venucius has implied that he doesn't think Galarynn will be able to join the Synod. Perhaps I should find more definitive evidence before I return to her.
- Index: 27
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Galarynn wants concrete evidence of her failure to join the Synod before she will consider my offer.
- Index: 28
  LogEntries:
  - Flags: []
- Index: 30
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have Galarynn's letter of recommendation from Cadius, but it doesn't look good. I should go break the bad news to her.
- Index: 40
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Galarynn was unable to join the Synod, but she agreed to meet Benuni Alfena anyway. I should go inform him that there's someone waiting to meet him in Bruma.
- Index: 50
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Benuni has agreed to meet Galarynn in Bruma. I should go tell Galarynn to expect him.
- Index: 55
  LogEntries:
  - Flags: []
- Index: 57
  LogEntries:
  - Flags: []
- Index: 58
  LogEntries:
  - Flags: []
- Index: 60
  Flags:
  - KeepInstanceDataFromHereOn
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Their meeting started off a bit rough, but Benuni and Galarynn seem to be getting along. Maybe now it's just a matter of time until their relationship progresses.
- Index: 61
  LogEntries:
  - Flags: []
- Index: 70
  Flags:
  - KeepInstanceDataFromHereOn
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Benuni and Galarynn have invited me to their wedding. I should try to make it, if I can. It will take place in Bruma's cathedral of St Martin on <Global.Day=CYRBrumaMS03WeddingDate> <Global.MonthWord=CYRBrumaMS03WeddingDate> at 9 in the morning.
- Index: 71
  LogEntries:
  - Flags: []
- Index: 75
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have missed Benuni and Galarynn's wedding. I should visit them in Applewatch and see how they're doing.
- Index: 80
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: I made it to Galarynn and Benuni's wedding and witnessed them exchange their vows. They seem very happy. I guess love doesn't always show up where you expect it.
- Index: 85
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: Galarynn and Benuni are married. They seem very happy. I guess love doesn't always show up where you expect it.
- Index: 100
  LogEntries:
  - Flags:
    - FailQuest
    Entry:
      TargetLanguage: English
      Value: Benuni Alfena has died. May he find companionship in Oblivion.
- Index: 105
  LogEntries:
  - Flags:
    - FailQuest
    Entry:
      TargetLanguage: English
      Value: Galarynn, Benuni's fated partner, has died.
