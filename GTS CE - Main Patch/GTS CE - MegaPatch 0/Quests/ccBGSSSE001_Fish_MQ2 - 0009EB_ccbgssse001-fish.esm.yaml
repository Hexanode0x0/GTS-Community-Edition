- Index: 10
  Unknown: 109
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Swims-In-Deep-Water has given me another fishing challenge. I should read the list he gave me to see what I will need to catch.
- Index: 20
  Unknown: 109
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: The fish that Swims-In-Deep-Water would like me to catch are a bit more elusive than last time. However, they come to the surface more frequently while it is raining. I should refer to the second volume of Fishing Mastery to learn more. He also asked me to help fish up his lucky fishing hat, lost at a fishing spot west of Sarethi Farm. He claims that it rains wherever he wears the hat when fishing. That sounds far-fetched, but I suppose I could use all the luck I can get.
- Index: 21
  Unknown: 171
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have read the second volume of Fishing Mastery. All of the fish I need to catch are most easily caught when it's raining in the warmer parts of Skyrim. Catfish and spadefish can only be caught in lakes, while pygmy sunfish are found in streams. Pearlfish can be caught in both lakes and streams. He also asked me to help fish up his lucky fishing hat, lost at a fishing spot west of Sarethi Farm. He claims that it rains wherever he wears the hat when fishing. That sounds far-fetched, but I suppose I could use all the luck I can get.
- Index: 30
  Unknown: 109
  LogEntries:
  - Flags: []
- Index: 200
  Unknown: 67
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: I've given Swims-In-Deep-Water all of the fish he requested as proof of completing his fishing challenge, as well as his lucky fishing hat. He rewarded me with an Argonian fishing rod, which will be useful when trying to catch large fish. He also handed me a sum of gold.
- Index: 210
