- Index: 80
- Index: 85
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: 'Theron paid me for my work clearing out his old hideout and we parted ways peacefully. He warned me not to return however, unless I wish to join his gang. '
- Index: 90
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Theron tried to kill me after revealing he found out I didn't work for Argis.
