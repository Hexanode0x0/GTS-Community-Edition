- Index: 1
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: A skittish Breton in Solitude told me that an old woman living near Riverwood is, in fact, a witch. I've been told to check her basement for evidence. Maybe I should look into it...
- Index: 9
  LogEntries:
  - Flags: []
- Index: 10
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I found a book in Anise's Cabin which seemed to know I was reading it. The book addressed me by name and recounted my actions. It pointed me towards the Windpeak Inn and a man named Theron.
- Index: 20
  LogEntries:
  - Flags: []
- Index: 30
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: 'Theron seems to believe I was sent by a man named "Argis", and wants to hire me for a job to retake his old hideout from his former gang.   '
- Index: 40
  LogEntries:
  - Flags: []
- Index: 50
  LogEntries:
