- Index: 4
- Index: 5
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Callen wants to make up with an old friend. I've agreed to help her kill an oversized horker. The beast was last seen somewhere along the northern coast. We should head there.
- Index: 10
  LogEntries:
  - Flags: []
- Index: 15
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: It is time to slay the Legendary Horker. Callen smells something wafting in from a small island to the west of the Brinehammer. It bears investigating.
- Index: 17
  LogEntries:
  - Flags: []
- Index: 20
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have vanquished Tusky, the legendary horker that some say sunk the mighty Brinehammer.  I should now speak to Callen about our next move.
- Index: 24
- Index: 25
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: We slew the legendary horker Tusky and retrieved the well-marbled meat. However, it still needs to be cooked. Callen knows of a chef in Markarth crazy enough to heed our request.
- Index: 30
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: We met Clario Moorsley, and he had no interest in cooking for us.  However, after some coaxing from Callen and a display of the fine horker meat, his interest has been piqued.
- Index: 35
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Clario has asked I gather ingredients for his special horker stew.  I am to retrieve a lavender, a tomato, a potion of resist frost, fire salts, carrots, and a scroll of repel undead.  I should bring him all the items at once to ensure they are fresh.  I should check with Callen as she may have some ingredients on hand.
- Index: 40
- Index: 45
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Clario has cooked the special horker stew, and the smell has blanketed the kitchen like a fat, overweight breeze.  I should speak with Callen as to how to proceed from here.
- Index: 50
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Clario has cooked up a special horker stew.  A masterpiece of culinary weirdness, it's time to deliver it to Callen's friend Gorr.
- Index: 55
  LogEntries:
  - Flags: []
- Index: 60
- Index: 100
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: I've brought the horker stew to Gorr, and renewed his friendship with Callen.
- Index: 250
  LogEntries:
