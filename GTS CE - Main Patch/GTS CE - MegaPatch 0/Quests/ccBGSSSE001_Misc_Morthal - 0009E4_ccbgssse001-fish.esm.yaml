  - Flags: []
    Entry:
      TargetLanguage: English
      Value: On Brutius's body, I found a journal. I should read it to discover what secrets he's been keeping.
- Index: 50
  Unknown: 40
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: It seems that Brutius was a wizard that has been luring unsuspecting fisherman into the woods under the guise of a fishing contest, only to slay and rob them. Of note is an enchanted ring that he recently lost in the river at the fishing spot he lured his victims. I might be able to claim it if I try fishing there myself.
- Index: 200
  Unknown: 40
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: Tamriel is a better place without Brutius preying upon the citizens of Morthal. I also managed to fish up the Warlock's Ring, the ring Brutius lost at the spot near the river where he lured his victims.
