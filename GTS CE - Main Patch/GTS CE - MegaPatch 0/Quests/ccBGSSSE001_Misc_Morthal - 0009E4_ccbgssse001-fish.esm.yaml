  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: A fisherman named Brutius is challenging anyone who would face him to a fishing contest. He requires his challengers to make a wager on who the better fisher is. If I want to test my fishing abilities against him, I should meet him on the docks in Morthal.
- Index: 10
  Unknown: 40
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I placed a bet with Brutius that I could best him in a fishing contest. He marked where we will have the contest on my map. I should meet him there when I am ready to face him.
- Index: 15
  LogEntries:
  - Flags: []
- Index: 20
  Unknown: 40
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: It seems that the fishing contest was nothing more than a trap. Brutius and several other wizards ambushed me as soon as I arrived at the location for the fishing contest. I will have to defeat them before I can find any answers.
- Index: 30
  Unknown: 40
  LogEntries:
  - Flags: []
    Conditions:
    - MutagenObjectType: ConditionFloat
      Data:
        MutagenObjectType: GetStageDoneConditionData
        Quest: 0009E4:ccbgssse001-fish.esm
        Stage: 20
      ComparisonValue: 1
    Entry:
      TargetLanguage: English
      Value: I defeated Brutius and the rest of his ambushers. I should search him to see if he kept a journal of his misdeeds.
  - Flags: []
    Conditions:
    - MutagenObjectType: ConditionFloat
      Data:
        MutagenObjectType: GetStageDoneConditionData
        Quest: 0009E4:ccbgssse001-fish.esm
        Stage: 20
    Entry:
      TargetLanguage: English
      Value: I defeated Brutius, who turned out to be a wizard disguised as a fisherman. I wonder what other secrets he might have been keeping. I should search him to see if he kept a journal.
- Index: 32
  LogEntries:
