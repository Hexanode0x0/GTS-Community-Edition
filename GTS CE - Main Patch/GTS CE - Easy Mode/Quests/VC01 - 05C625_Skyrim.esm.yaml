    Entry:
      TargetLanguage: English
      Value: In my search for a cure for vampirism, I read a book entitled "Undeath Undone". As I was reading, a note addressed to Urag fell out from between the book's pages. The author of the note, Falion, seems knowledgeable about the history of the cure for vampirism. I should find out more about this person.
