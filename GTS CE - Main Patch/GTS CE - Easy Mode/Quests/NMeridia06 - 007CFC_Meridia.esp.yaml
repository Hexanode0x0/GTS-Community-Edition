    Entry:
      TargetLanguage: English
      Value: Alara instructed me to meet her and the others at Fort Justice. I did so, and she gave me a letter addressed to the Champion. The letter asks me to meet the author at Old Hroldan Inn in the Reach. Alara and I traveled to meet who sent the letter, and it was a young woman named Vaegra who is a member of the Necromancer Union. She informed us that we have been infiltrated by a Dark Elf. Alara believed this to be Garin, but I have spoken to Garin who was adamant that the true traitor is Velteth. Velteth has revealed himself to be a Malevolent plant, and we should execute him.
