- Index: 100
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: After traveling to meet Vaegra in Old Hroldan, she informed us we had been infiltrated by a Dark Elf. This turned out to be Velteth, who I have executed with the help of Garin Anathri. Following this, Meridia appeared and spoke to me. Now that the Order is no longer plagued by an evil Necromancer, Meridia has given us instructions on how to proceed - including destroying a Pocket Realm gifted to the Malevolent leader by Molag Bal. Meridia indicated that Garin would be able to tell me more, so I should speak with him.
