      Value: Having killed Offryn and his acolytes, I have reached the throne room, where the Radiant Dark awaits.  All that was left was defeat Nelos and his guild of mages, and Olivia would have her vengeance.  Now, having vanquished Nelos and the Radiant Dark, I should speak with Olivia.
- Index: 85
