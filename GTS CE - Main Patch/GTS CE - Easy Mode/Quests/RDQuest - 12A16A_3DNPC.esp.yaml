    Entry:
      TargetLanguage: English
      Value: I have found a mysterious journal that points to Jadro'Ra's killer. Olivia informed me that she knows the person in question, a Dark Elf named Nelos, who believes in a prophecy called the "Long Night."  Olivia has asked me to inspect a suspected ritual site connected to the legend.
- Index: 10
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have found a mysterious journal that points to Jadro'Ra's killer. Olivia informed me that she knows the person in question, a Dark Elf named Nelos, who believes in a prophecy called the "Long Night."  Olivia has asked me to inspect a suspected ritual site connected to the legend.  It was revealed to be the headquarters of the Radiant Dark guild.
- Index: 12
- Index: 15
  LogEntries:
  - Flags: []
- Index: 20
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have found a mysterious journal that points to Jadro'Ra's killer. Olivia informed me that she knows the person in question, a Dark Elf named Nelos, who believes in a prophecy called the "Long Night."  Olivia has asked me to inspect a suspected ritual site connected to the legend.  It was revealed to be the headquarters of the Radiant Dark guild.  There I met Nelos, who asked I return to Winterhold and deliver Olivia to him.
- Index: 25
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: After being persuaded to join the Radiant Dark, I informed Olivia that Nelos was ill and the Radiant Dark was all but finished. Having bought the ruse, any advantage she gained from Vanus' spells will be negated by her lack of preparation.
- Index: 30
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: After being persuaded to join the Radiant Dark, I informed Olivia that Nelos was ill and the Radiant Dark was all but finished. Having bought the ruse, any advantage she gained from Vanus' spells will be negated by her lack of preparation.  Moreover, she sees this as an opportunity to train unwitting novices.
- Index: 32
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: After reaffirming my commitment to her cause, I have received one of Vanus' spells from Olivia. We should enter the Frozen Hearth to meet the other wizards she has recruited to help eliminate the Radiant Dark.
- Index: 35
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I informed Olivia that Nelos was sick and the Radiant Dark was all but finished. Having bought the ruse, she has no idea what awaits her.  Moreover, she has recruited a band of greenthumbs to accompany us.
- Index: 40
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Olivia, Helsig, Nelacar, and I have banded together to eliminate the Radiant Dark.  Helsig appears to have a personal agenda for coming along, whereas Nelacar seems willing to help in order to redeem himself further for previous transgressions.
- Index: 42
- Index: 45
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have successfully led Olivia into a trap and have proven myself as a member of the Radiant Dark.  Olivia, uncertain to my allegiances, may have brought Vanus' spells with her should I prove loyal.  In the end, her lack of decisiveness will be a boon to me.  I should kill her and the novices now and collect the spells from her body.
- Index: 50
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Having killed Offryn and his acolytes, I have reached the throne room, where the Radiant Dark awaits.  All that's left to do now is defeat Nelos and his guild of mages, and Olivia will have her vengeance.
- Index: 60
- Index: 70
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have successfully led Olivia into a trap and have proven myself as a member of the Radiant Dark.  Olivia, uncertain to my allegiances, may have brought Vanus' spells with her should I prove loyal.  In the end, her lack of decisiveness will be a boon to me.  With her dead, I should loot her body and speak to Nelos.
