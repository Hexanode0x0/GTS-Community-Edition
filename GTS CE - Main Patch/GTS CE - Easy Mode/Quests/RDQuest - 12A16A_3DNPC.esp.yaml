- Index: 100
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: Together with Nelos, I defeated Olivia and ensured the continued growth of the Radiant Dark.  However, Nelos revealed that he was indeed on the brink of death, and that all along the prophecy pointed to me as the true child of the Long Night.  Having ushered me to my rightful place, Nelos was free to die.  As a consequence, the Radiant Dark is now under my control.
- Index: 110
