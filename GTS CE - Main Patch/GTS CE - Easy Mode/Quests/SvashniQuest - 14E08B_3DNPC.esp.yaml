- Index: 200
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: With my help, S'vashni slew her master and his eight shadows, but she failed once again to learn the Stance of Arkay. Unable to accept the technique is now lost forever, she wades through the snow looking for answers.  It is unlikely she will ever find them.
