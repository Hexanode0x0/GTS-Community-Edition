- Index: 95
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I told Garrett I had a vision from the Divines that the ritual should be held in the forests south of Dawnstar.  S'vashni was waiting for us both in the forest just west of the Weynon Stones, and the two spoke briefly before engaging in battle.  I decided to help S'vashni, as Garrett summoned 8 ghosts of Akavir using the power derived from the blessings I received.  In the end, however, it appears as if Garrett has one, even in death.
- Index: 100
  LogEntries:
  - Flags: []
    Entry:
