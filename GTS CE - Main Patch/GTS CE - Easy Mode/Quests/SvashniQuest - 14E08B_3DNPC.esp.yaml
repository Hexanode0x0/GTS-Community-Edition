      Value: S'vashni has told me the story of how she slew her master, and how it left The Way of the Nine without a true heir. I encountered her again at a ruin called Skyshadow Crypt, where she was arguing with a pilgrim.
- Index: 20
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: S'vashni has told me the story of how she slew her master, and how it left The Way of the Nine without a true heir. I encountered her again at a ruin called Skyshadow Crypt, where she was arguing with a pilgrim.  The pilgrim led me to the back chamber away from S'vashni.
- Index: 25
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: S'vashni has told me the story of how she slew her master, and how it left The Way of the Nine without a true heir. I encountered her again at a ruin called Skyshadow Crypt, where she was arguing with a pilgrim.  The pilgrim led me to the back chamber and subsequently died.  In his place stood a ghost.
- Index: 30
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I met S'vashni's former master Garrett in Skyshadow Crypt. He asked me to help him vanquish his pupil by using the Way of the Nine. As there is no time to undergo the training required, he has asked I borrow the power by walking the supplicant's road and receiving blessings from 8 avatars of the Gods, with Garrett himself representing Arkay.
- Index: 35
- Index: 40
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I met S'vashni's former master Garrett in Skyshadow Crypt. He asked me to help him vanquish his pupil by using the Way of the Nine. As there is no time to undergo the training required, he has asked I borrow the power by walking the supplicant's road and receiving blessings from 8 avatars of the Gods, with Garrett himself representing Arkay.  I received them all and should now return to Skyshadow Crypt.
