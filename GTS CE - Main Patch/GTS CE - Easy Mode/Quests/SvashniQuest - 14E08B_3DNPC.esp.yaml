- Index: 1
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: S'vashni has told me the story of how she slew her master, and how it left The Way of the Nine without a true heir. I should keep an eye out for any further developments.
- Index: 2
