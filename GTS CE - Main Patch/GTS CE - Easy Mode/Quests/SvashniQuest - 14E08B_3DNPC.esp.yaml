      Value: Using the blessings of the Divines, Garrett lit the bonfires of Skyshadow Crypt and summoned 8 ghosts of the Akavir utilizing various stances from his technique.  Having defeated them all, I now can summon the Blades of the Nine when using twin swords.
- Index: 75
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Using the blessings of the Divines, Garrett lit the bonfires of Skyshadow Crypt and summoned 8 ghosts of the Akavir utilizing various stances from his technique.  Having defeated them all, I now can summon the Blades of the Nine when using twin swords. All that is left now is to defeat his former pupil in single combat.  She is waiting in the forest just west of the Weynon Stones.
