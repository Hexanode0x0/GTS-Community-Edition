    Entry:
      TargetLanguage: English
      Value: I successfully helped Dar'Rakki with his query regarding the seven thousand steps of High Hrothgar. Unfortunately the perils of the hard truth are many, as Dar'Rakki has taken the news hard, and imbibed a poisoned drink that proved fatal.
