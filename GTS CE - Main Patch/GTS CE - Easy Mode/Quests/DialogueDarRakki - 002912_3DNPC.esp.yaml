- Index: 5
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: "Dar'Rakki asked me to count High Hrothgar's steps one by one. Seeming to believe there was a conspiracy at work regarding their number. And if there were less than 7000, it would prove there's no integrity in the world. Maybe I should humor him? "
- Index: 10
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Dar'Rakki tasked me with finding out if there are really seven thousand steps up High Hrothgar.
- Index: 20
- Index: 100
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: I told Dar'Rakki a white lie, telling him there were indeed 7000 thousand steps to High Hrothgar despite no evidence to show it.  It has reaffirmed his faith, however, and he has found new hope through my assistance.
- Index: 110
  LogEntries:
