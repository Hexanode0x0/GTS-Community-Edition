      Value: I have returned to Meridia's Sanctum to find it attacked by a group of necromancers known as The Malevolent. Acolyte Kariss has been killed. I have spoken to Alara to let her know about the Necromancer plans to raise the First Vampire. Now, Initiate Velteth has asked me to travel to Fort Justice, an abandoned outpost in the Rift to ensure it is safe.
- Index: 40
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have returned to Meridia's Sanctum to find it attacked by a group of necromancers known as The Malevolent. Acolyte Kariss has been killed. I have spoken to Alara to let her know about the Necromancer plans to raise the First Vampire. Now, Initiate Velteth has asked me to travel to Fort Justice, an abandoned outpost in the Rift to ensure it is safe. Upon entering, I was confronted by Fiya, Dark Master of The Malevolent. I must now make my way through the Fort to see if I can catch up with her.
- Index: 50
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have returned to Meridia's Sanctum to find it attacked by a group of necromancers known as The Malevolent. Acolyte Kariss has been killed. I have spoken to Alara to let her know about the Necromancer plans to raise the First Vampire. Now, Initiate Velteth has asked me to travel to Fort Justice, an abandoned outpost in the Rift to ensure it is safe. Upon entering, I was confronted by Fiya, Dark Master of The Malevolent and have now wiped out her forces from the Fort. I should return to Initiate Velteth to let him know the news.
- Index: 60
