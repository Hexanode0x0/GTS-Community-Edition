  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have returned to Meridia's Sanctum to find it attacked by a group of necromancers known as The Malevolent. Acolyte Kariss has been killed. I have spoken to Alara to let her know about the Necromancer plans to raise the First Vampire. Following this, I have cleared out Fort Justice, an abandoned outpost in the Rift. Now High Priestess Alara is performing a funeral ceremony for Acolyte Kariss. I should attend.
